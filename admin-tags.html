<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rinqr — Tag Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d0d0d;color:#e8edf2;font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
    :root{
      --cyan:#00b4aa;--cyan2:#00d4c8;
      --border:rgba(255,255,255,0.08);--border2:rgba(0,180,170,0.25);
      --text:#e8edf2;--muted:rgba(232,237,242,0.5);--muted2:rgba(232,237,242,0.3);
      --mono:'DM Mono',monospace;
      --card:rgba(255,255,255,0.04);
    }

    /* NAV */
    .nav{
      background:rgba(13,13,13,0.95);border-bottom:1px solid var(--border);
      padding:0 32px;height:60px;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:100;
    }
    .nav-logo{display:flex;align-items:center;text-decoration:none}
    .nav-logo img{height:32px;width:auto}
    .nav-badge{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--cyan);background:rgba(0,180,170,.1);border:1px solid var(--border2);padding:4px 10px;border-radius:100px}
    .nav-back{font-family:var(--mono);font-size:11px;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:5px 12px;border-radius:6px;transition:border-color .15s,color .15s}
    .nav-back:hover{border-color:var(--border2);color:var(--cyan)}

    /* LAYOUT */
    .page{max-width:1100px;margin:0 auto;padding:40px 32px 80px}
    .page-title{font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
    .page-title span{color:var(--cyan)}
    .page-sub{font-size:14px;color:var(--muted);margin-bottom:36px;font-family:var(--mono)}

    /* CONTROL PANEL */
    .control-panel{
      background:var(--card);border:1px solid var(--border);
      border-radius:14px;padding:28px;margin-bottom:28px;
    }
    .panel-title{font-family:var(--mono);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);margin-bottom:20px}
    .controls{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:14px;align-items:end}
    .field{display:flex;flex-direction:column;gap:8px}
    .field label{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2)}
    .field input,.field select{
      background:rgba(255,255,255,0.06);border:1px solid var(--border);
      border-radius:8px;padding:11px 14px;color:var(--text);
      font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;outline:none;
      transition:border-color .15s;width:100%;
    }
    .field input:focus,.field select:focus{border-color:var(--border2)}
    .field input::placeholder{color:var(--muted2)}
    .field select option{background:#1a1a1a}
    .generate-btn{
      background:var(--cyan);color:#0d0d0d;
      font-size:15px;font-weight:700;
      padding:11px 24px;border-radius:8px;border:none;cursor:pointer;
      transition:background .2s,transform .1s;white-space:nowrap;
      font-family:'Plus Jakarta Sans',sans-serif;
    }
    .generate-btn:hover{background:var(--cyan2);transform:translateY(-1px)}
    .generate-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

    /* AUTH */
    .auth-row{margin-top:18px;padding-top:18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px}
    .auth-row label{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--muted2);white-space:nowrap}
    .auth-row input{
      background:rgba(255,255,255,0.06);border:1px solid var(--border);
      border-radius:8px;padding:9px 14px;color:var(--text);
      font-family:var(--mono);font-size:13px;outline:none;flex:1;
      transition:border-color .15s;
    }
    .auth-row input:focus{border-color:var(--border2)}

    /* STATUS BAR */
    .status-bar{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:20px;flex-wrap:wrap;gap:12px;
    }
    .status-info{font-family:var(--mono);font-size:13px;color:var(--muted)}
    .status-info strong{color:var(--cyan)}
    .action-btns{display:flex;gap:10px}
    .action-btn{
      font-family:var(--mono);font-size:11px;letter-spacing:1px;
      padding:8px 16px;border-radius:7px;cursor:pointer;
      border:1px solid var(--border);background:transparent;
      color:var(--muted);transition:border-color .15s,color .15s,background .15s;
    }
    .action-btn:hover{border-color:var(--border2);color:var(--text)}
    .action-btn.primary{background:var(--cyan);color:#0d0d0d;border-color:var(--cyan)}
    .action-btn.primary:hover{background:var(--cyan2);border-color:var(--cyan2)}

    /* TAG GRID */
    .tag-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:16px;
    }
    .tag-card{
      background:var(--card);border:1px solid var(--border);
      border-radius:12px;padding:20px;text-align:center;
      transition:border-color .2s;
    }
    .tag-card:hover{border-color:var(--border2)}
    .tag-qr-wrap{
      width:120px;height:120px;
      background:#fff;border-radius:8px;
      margin:0 auto 14px;
      display:flex;align-items:center;justify-content:center;
      padding:8px;
    }
    .tag-qr-wrap canvas,.tag-qr-wrap img{width:100%!important;height:100%!important}
    .tag-id{
      font-family:var(--mono);font-size:13px;font-weight:500;
      color:var(--cyan);letter-spacing:2px;margin-bottom:6px;
    }
    .tag-url{font-size:10px;color:var(--muted2);font-family:var(--mono);word-break:break-all;line-height:1.4}
    .tag-status{
      display:inline-flex;align-items:center;gap:5px;
      font-family:var(--mono);font-size:10px;letter-spacing:1px;
      padding:3px 10px;border-radius:100px;margin-top:8px;
    }
    .tag-status.unactivated{background:rgba(160,96,16,.1);color:#a06010;border:1px solid rgba(160,96,16,.25)}
    .tag-status.active{background:rgba(26,122,70,.1);color:#1a7a46;border:1px solid rgba(26,122,70,.25)}

    /* EMPTY STATE */
    .empty-state{
      text-align:center;padding:80px 20px;
      border:1px dashed var(--border);border-radius:14px;
    }
    .empty-icon{font-size:48px;margin-bottom:16px;display:block}
    .empty-title{font-size:20px;font-weight:700;color:var(--muted);margin-bottom:8px}
    .empty-sub{font-size:14px;color:var(--muted2);font-family:var(--mono)}

    /* ALERT */
    .alert{
      padding:14px 18px;border-radius:10px;margin-bottom:20px;
      font-size:14px;display:none;align-items:center;gap:10px;
    }
    .alert.show{display:flex}
    .alert.error{background:rgba(185,28,28,.1);border:1px solid rgba(185,28,28,.3);color:#f87171}
    .alert.success{background:rgba(26,122,70,.1);border:1px solid rgba(26,122,70,.3);color:#4ade80}

    /* LOADING */
    .spinner{width:18px;height:18px;border:2px solid rgba(13,13,13,.3);border-top-color:#0d0d0d;border-radius:50%;animation:spin 1s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* PRINT STYLES */
    @media print{
      body{background:#fff!important;color:#000!important}
      .nav,.control-panel,.status-bar,.action-btns,.no-print{display:none!important}
      .page{padding:0;max-width:100%}
      .tag-grid{grid-template-columns:repeat(4,1fr);gap:8px}
      .tag-card{background:#fff!important;border:1px solid #ddd!important;border-radius:8px;page-break-inside:avoid;padding:12px}
      .tag-id{color:#00b4aa!important}
      .tag-url{color:#666!important}
      .tag-qr-wrap{background:#fff!important}
      .tag-status{display:none}
    }

    @media(max-width:700px){
      .controls{grid-template-columns:1fr 1fr}
      .generate-btn{grid-column:span 2}
      .tag-grid{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>

<nav class="nav">
  <div style="display:flex;align-items:center;gap:14px">
    <a href="index.html" class="nav-logo"><img src="Rinqr_logo.png" alt="Rinqr"></a>
    <span class="nav-badge">ADMIN</span>
  </div>
  <a href="dashboard.html" class="nav-back">← Dashboard</a>
</nav>

<div class="page">
  <div class="page-title">Tag <span>Generator</span></div>
  <div class="page-sub">Generate batch tag IDs, preview QR codes, and print sticker sheets</div>

  <!-- CONTROL PANEL -->
  <div class="control-panel">
    <div class="panel-title">Generate new tags</div>
    <div class="controls">
      <div class="field">
        <label>Prefix</label>
        <input type="text" id="prefixInput" value="PP" maxlength="4" placeholder="PP" style="text-transform:uppercase"
          oninput="this.value=this.value.toUpperCase().replace(/[^A-Z]/g,'')">
      </div>
      <div class="field">
        <label>Quantity</label>
        <select id="countSelect">
          <option value="5">5 tags</option>
          <option value="10" selected>10 tags</option>
          <option value="25">25 tags</option>
          <option value="50">50 tags</option>
          <option value="100">100 tags</option>
          <option value="200">200 tags</option>
        </select>
      </div>
      <div class="field">
        <label>Base URL</label>
        <input type="text" id="baseUrl" value="https://rinqr.com/index.html" placeholder="https://rinqr.com/index.html">
      </div>
      <button class="generate-btn" id="generateBtn" onclick="generateTags()">
        Generate →
      </button>
    </div>
    <div class="auth-row">
      <label>ADMIN KEY</label>
      <input type="password" id="adminKey" placeholder="Enter your admin key…">
    </div>
  </div>

  <!-- ALERT -->
  <div class="alert" id="alert"></div>

  <!-- STATUS + ACTIONS -->
  <div class="status-bar" id="statusBar" style="display:none">
    <div class="status-info" id="statusInfo"></div>
    <div class="action-btns no-print">
      <button class="action-btn" onclick="copyAll()">📋 Copy all IDs</button>
      <button class="action-btn" onclick="downloadCSV()">⬇ Export CSV</button>
      <button class="action-btn primary" onclick="window.print()">🖨 Print stickers</button>
    </div>
  </div>

  <!-- TAG GRID -->
  <div id="tagGrid">
    <div class="empty-state">
      <span class="empty-icon">🏷️</span>
      <div class="empty-title">No tags generated yet</div>
      <div class="empty-sub">Enter your admin key and hit Generate →</div>
    </div>
  </div>
</div>

<script>
  let generatedTags = [];

  async function generateTags() {
    const btn      = document.getElementById('generateBtn');
    const prefix   = document.getElementById('prefixInput').value.trim() || 'PP';
    const count    = parseInt(document.getElementById('countSelect').value);
    const adminKey = document.getElementById('adminKey').value.trim();
    const baseUrl  = document.getElementById('baseUrl').value.trim() || 'https://rinqr.com/index.html';

    if (!adminKey) { showAlert('Enter your admin key first.', 'error'); return; }

    btn.innerHTML = '<span class="spinner"></span> Generating…';
    btn.disabled  = true;
    hideAlert();

    try {
      const res  = await fetch('/api/admin/generate-tags', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body:    JSON.stringify({ count, prefix }),
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        showAlert(data.error || 'Something went wrong.', 'error');
        btn.innerHTML = 'Generate →'; btn.disabled = false;
        return;
      }

      generatedTags = data.tags;
      renderTags(data.tags, baseUrl);
      showAlert(`✓ ${data.generated} tags generated and saved to database.`, 'success');

      document.getElementById('statusBar').style.display = 'flex';
      document.getElementById('statusInfo').innerHTML =
        `<strong>${data.generated}</strong> tags generated · prefix <strong>${prefix}</strong> · ready to activate`;

    } catch (err) {
      showAlert('Network error — check your connection.', 'error');
    }

    btn.innerHTML = 'Generate →'; btn.disabled = false;
  }

  function renderTags(tags, baseUrl) {
    const grid = document.getElementById('tagGrid');
    grid.innerHTML = '';

    tags.forEach(tagId => {
      const url  = `${baseUrl}?tag=${encodeURIComponent(tagId)}`;
      const card = document.createElement('div');
      card.className = 'tag-card';
      card.innerHTML = `
        <div class="tag-qr-wrap" id="qr-${tagId}"></div>
        <div class="tag-id">${tagId}</div>
        <div class="tag-url">${url}</div>
        <span class="tag-status unactivated">⬤ Unactivated</span>
      `;
      grid.appendChild(card);

      // Generate QR code
      new QRCode(document.getElementById(`qr-${tagId}`), {
        text:           url,
        width:          104,
        height:         104,
        colorDark:      '#000000',
        colorLight:     '#ffffff',
        correctLevel:   QRCode.CorrectLevel.H,
      });
    });
  }

  function copyAll() {
    const text = generatedTags.join('\n');
    navigator.clipboard.writeText(text).then(() => {
      showAlert(`✓ ${generatedTags.length} tag IDs copied to clipboard.`, 'success');
    });
  }

  function downloadCSV() {
    const baseUrl = document.getElementById('baseUrl').value.trim() || 'https://rinqr.com/index.html';
    const header  = 'Tag ID,Activation URL,Status\n';
    const rows    = generatedTags.map(t =>
      `${t},${baseUrl}?tag=${encodeURIComponent(t)},Unactivated`
    ).join('\n');
    const blob    = new Blob([header + rows], { type: 'text/csv' });
    const a       = document.createElement('a');
    a.href        = URL.createObjectURL(blob);
    a.download    = `rinqr-tags-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className   = `alert show ${type}`;
  }
  function hideAlert() {
    document.getElementById('alert').classList.remove('show');
  }

  // Allow Enter key on admin key field to trigger generate
  document.getElementById('adminKey').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateTags();
  });
</script>
</body>
</html>
